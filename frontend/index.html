<!DOCTYPE html>
<html lang="en" class="theme-dark" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" type="image/png" href="https://img.cathiefish.art/tradingview/icon2.jpg">
    <link rel="apple-touch-icon" href="https://img.cathiefish.art/tradingview/icon2.jpg">
    <!-- Config -->
    <script src="auth-config.js?v=3"></script>
    <style>
        :root {
            --tv-color-platform-background: #131722;
            --tv-color-pane-background: #1e222d;
            --tv-color-toolbar-button-background-hover: #2a2e39;
            --tv-color-toolbar-button-background-active: #2962ff;
            --tv-color-toolbar-button-text: #787b86;
            --tv-color-toolbar-button-text-hover: #d1d4dc;
            --tv-color-toolbar-button-text-active: #fff;
            --tv-color-border: #2a2e39;
            --tv-color-item-active-text: #d1d4dc;
            --tv-color-text-secondary: #787b86;
            --tv-color-positive: #26a69a;
            --tv-color-negative: #ef5350;
            --tv-color-blue: #2962ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif;
            background: var(--tv-color-platform-background);
            color: var(--tv-color-item-active-text);
            user-select: none;
        }

        .main-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
        }

        #tv_chart_container {
            flex: 1;
            height: auto;
            min-height: 180px;
            min-width: 0;
            background: #0F0F0F;
        }

        .script-editor-dock {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #131722;
            border-top: 1px solid #2a2e39;
        }

        .script-editor-dock.is-collapsed .script-editor-resizer,
        .script-editor-dock.is-collapsed .script-editor-panel {
            display: none;
        }

        .script-editor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            height: 36px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
            background: #131722;
        }

        .script-editor-header:hover {
            background: #1e222d;
        }

        .script-collapse-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: #787b86;
            cursor: pointer;
            flex-shrink: 0;
        }

        .script-collapse-btn:hover {
            background: #2a2e39;
            color: #d1d4dc;
        }

        .script-collapse-btn svg {
            transition: transform 0.2s ease;
        }

        .script-editor-dock.is-collapsed .script-collapse-btn svg {
            transform: rotate(180deg);
        }

        .script-editor-title {
            font-size: 13px;
            font-weight: 500;
            color: #d1d4dc;
            flex-shrink: 0;
        }

        .script-editor-active-name {
            font-size: 12px;
            color: #787b86;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .script-editor-header .toolbar-spacer {
            flex: 1;
        }

        .script-editor-resizer {
            height: 5px;
            cursor: row-resize;
            background: #3D3D3D;
            flex-shrink: 0;
            touch-action: none;
        }

        .script-editor-resizer:hover,
        body.script-resizing .script-editor-resizer {
            background: #2962ff;
        }

        .script-editor-panel {
            height: 280px;
            min-height: 120px;
            max-height: 55vh;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            border-top: 1px solid #2a2e39;
            flex-shrink: 0;
        }

        .script-editor-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: #131722;
            border-bottom: 1px solid #2a2e39;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .script-editor-toolbar .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .script-editor-toolbar .toolbar-spacer {
            flex: 1;
        }

        .script-btn {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid #363a45;
            background: #2a2e39;
            color: #d1d4dc;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .script-btn:hover {
            background: #363a45;
            border-color: #434651;
        }

        .script-btn-primary {
            background: #2962ff;
            border-color: #2962ff;
            color: #fff;
        }

        .script-btn-primary:hover {
            background: #1e53e5;
            border-color: #1e53e5;
        }

        .script-btn-danger {
            border-color: #5c2b2b;
            color: #ef5350;
        }

        .script-btn-danger:hover {
            background: rgba(239, 83, 80, 0.12);
            border-color: #ef5350;
        }

        .script-select {
            min-width: 160px;
            max-width: 220px;
            padding: 5px 8px;
            border-radius: 4px;
            border: 1px solid #363a45;
            background: #1e222d;
            color: #d1d4dc;
            font-size: 12px;
        }

        .script-strategy-pnl {
            font-size: 12px;
            color: #787b86;
            white-space: nowrap;
            padding: 0 4px;
        }

        .script-strategy-pnl.is-positive {
            color: #26a69a;
        }

        .script-strategy-pnl.is-negative {
            color: #ef5350;
        }

        .script-editor-body {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        #monacoEditorContainer {
            position: absolute;
            inset: 0;
        }

        body.script-resizing {
            cursor: row-resize !important;
            user-select: none;
        }

        body.script-resizing .chart-cell {
            pointer-events: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #363a45;
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4e58;
        }

        .layout-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Right widgets area */
        .right-widgets {
            display: flex;
            height: 100%;
            flex-shrink: 0;
            position: relative;
        }

        /* Watchlist Panel */
        .watchlist-panel {
            width: 0;
            height: 100%;
            background: #0F0F0F;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            position: relative;
        }

        .watchlist-panel.is-visible {
            width: 300px;
            opacity: 1;
        }

        /* Widgetbar Resizer Handle */
        .widgetbar-handle {
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background-color: #3D3D3D;
            border-right: 1px solid #131722;
            transition: background-color 0.2s, width 0.1s;
            z-index: 10;
            touch-action: none;
            flex-shrink: 0;
            order: -1;
        }

        /* Hide widgetbar handle when panel is not visible */
        .right-widgets:has(.watchlist-panel:not(.is-visible)) .widgetbar-handle {
            display: none;
        }

        /* Removed hover and drag color effects */
        /* Removed widgetbar-handle white indicator line */

        /* Guide lines also do not change color */

        body.resizing {
            cursor: col-resize !important;
            user-select: none;
        }

        /* Panel Header */
        .panel-header {
            height: 43px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            position: relative;
        }

        .panel-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            /* Left position: adjust separator left margin here, 0 = flush left */
            right: 0;
            height: 4px;
            /* Height: adjust separator height here */
            background-color: #3D3D3D;
            /* Color: change separator color here */
            border-bottom: 1px solid #3D3D3D;
        }

        /* Dropdown Trigger */
        .list-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px 6px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .list-selector:hover {
            background: var(--tv-color-toolbar-button-background-hover);
        }

        .list-selector-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--tv-color-item-active-text);
            margin-left: 16px;
        }

        .list-selector-arrow {
            color: var(--tv-color-text-secondary);
        }

        /* Header Actions */
        .header-actions {
            display: flex;
            gap: 4px;
        }

        .header-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--tv-color-item-active-text);
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .header-btn:hover {
            background: var(--tv-color-toolbar-button-background-hover);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 48px;
            left: 8px;
            width: 240px;
            background: var(--tv-color-pane-background);
            border: 1px solid var(--tv-color-border);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 100;
            padding: 8px 0;
        }

        .dropdown-menu.is-open {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--tv-color-item-active-text);
            font-size: 13px;
            transition: background 0.1s;
        }

        .dropdown-item:hover {
            background: var(--tv-color-toolbar-button-background-hover);
        }

        .dropdown-item svg {
            margin-right: 10px;
            color: var(--tv-color-text-secondary);
            flex-shrink: 0;
        }

        .dropdown-item:hover svg {
            color: var(--tv-color-item-active-text);
        }

        .dropdown-item.is-active {
            background: rgba(41, 98, 255, 0.1);
            color: var(--tv-color-blue);
        }

        .dropdown-item.is-active svg {
            color: var(--tv-color-blue);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--tv-color-border);
            margin: 8px 0;
        }

        .dropdown-section-title {
            padding: 8px 12px 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--tv-color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Add Symbol Panel */
        .add-symbol-panel {
            display: none;
            padding: 8px 12px;
            border-bottom: 1px solid var(--tv-color-border);
            background: var(--tv-color-pane-background);
        }

        .add-symbol-panel.is-open {
            display: flex;
            gap: 8px;
        }

        .add-symbol-input {
            flex: 1;
            background: var(--tv-color-platform-background);
            border: 1px solid var(--tv-color-border);
            border-radius: 4px;
            padding: 6px 10px;
            color: var(--tv-color-item-active-text);
            font-size: 13px;
            outline: none;
        }

        .add-symbol-input:focus {
            border-color: var(--tv-color-blue);
        }

        .add-symbol-btn {
            padding: 6px 12px;
            background: var(--tv-color-toolbar-button-background-hover);
            border: none;
            border-radius: 4px;
            color: var(--tv-color-item-active-text);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .add-symbol-btn:hover {
            background: #363a45;
        }

        /* List Header */
        .list-header {
            display: flex;
            padding: 8px 12px;
            font-size: 11px;
            color: var(--tv-color-text-secondary);
            flex-shrink: 0;
            border-bottom: 1px solid var(--tv-color-border);
        }

        .list-header-symbol {
            flex: 1;
        }

        .list-header-values {
            display: flex;
            gap: 24px;
            padding-right: 8px;
        }

        .list-header-values span {
            text-align: right;
        }

        .list-header-values span:first-child {
            min-width: 70px;
        }

        .list-header-values span:last-child {
            min-width: 60px;
        }

        /* List Content */
        .list-content {
            flex: 1;
            overflow-y: auto;
        }

        /* Watchlist Item */
        .watchlist-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(42, 46, 57, 0.3);
            cursor: grab;
            transition: background 0.1s;
            position: relative;
        }

        .watchlist-item:hover {
            background: var(--tv-color-toolbar-button-background-hover);
        }

        .watchlist-item:active {
            cursor: grabbing;
        }

        .watchlist-item.is-dragging {
            opacity: 0.5;
            background: var(--tv-color-toolbar-button-background-hover);
        }

        .watchlist-item.drag-over-top {
            border-top: 2px solid var(--tv-color-blue);
        }

        .watchlist-item.drag-over-bottom {
            border-bottom: 2px solid var(--tv-color-blue);
        }

        .watchlist-item.is-selected {
            background: var(--tv-color-toolbar-button-background-hover);
            position: relative;
        }

        .watchlist-item.is-selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--tv-color-blue);
        }

        .item-grip {
            color: #4a4e58;
            margin-right: 8px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .watchlist-item:hover .item-grip {
            opacity: 1;
        }

        .item-symbol {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--tv-color-item-active-text);
        }

        .item-values {
            display: flex;
            gap: 24px;
            text-align: right;
            padding-right: 8px;
        }

        .item-last {
            font-size: 13px;
            font-weight: 500;
            min-width: 70px;
        }

        .item-change {
            font-size: 13px;
            font-weight: 500;
            min-width: 60px;
        }

        .item-change.positive {
            color: var(--tv-color-positive);
        }

        .item-change.negative {
            color: var(--tv-color-negative);
        }

        .is-positive {
            color: var(--tv-color-positive);
        }

        .is-negative {
            color: var(--tv-color-negative);
        }

        .item-remove {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tv-color-toolbar-button-background-hover);
            border: none;
            border-radius: 4px;
            color: var(--tv-color-text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }

        .watchlist-item:hover .item-remove {
            opacity: 1;
        }

        .item-remove:hover {
            color: var(--tv-color-negative);
        }

        /* Right Toolbar */
        .right-toolbar {
            width: 52px;
            height: 100%;
            background: #0F0F0F;
            border-left: 1px solid var(--tv-color-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .toolbar-button {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--tv-color-toolbar-button-text);
            cursor: pointer;
            border-radius: 4px;
            margin: 1px 0;
            transition: all 0.1s;
            position: relative;
        }

        .toolbar-button:hover {
            background: var(--tv-color-toolbar-button-background-hover);
            color: var(--tv-color-toolbar-button-text-hover);
        }

        .toolbar-button.is-active {
            color: var(--tv-color-blue);
        }

        .toolbar-button.is-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: var(--tv-color-blue);
            border-radius: 0 2px 2px 0;
        }

        .toolbar-separator {
            width: 24px;
            height: 1px;
            background: var(--tv-color-border);
            margin: 6px 0;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .icon-svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Light theme */
        html.theme-light {
            --tv-color-platform-background: #ffffff;
            --tv-color-pane-background: #f0f3fa;
            --tv-color-toolbar-button-background-hover: #e0e3eb;
            --tv-color-toolbar-button-text: #6a6d78;
            --tv-color-toolbar-button-text-hover: #131722;
            --tv-color-border: #e0e3eb;
            --tv-color-item-active-text: #131722;
            --tv-color-text-secondary: #6a6d78;
        }

        html.theme-light .watchlist-item.is-selected::before {
            background: var(--tv-color-blue);
        }

        html.theme-light .watchlist-panel,
        html.theme-light .right-toolbar {
            background: #ffffff;
        }

        html.theme-light .widgetbar-handle {
            background-color: #e0e3eb;
            border-right-color: #d1d4dc;
        }

        html.theme-light .panel-header::after {
            background-color: #e0e3eb;
            border-bottom-color: #d1d4dc;
        }

        html.theme-light .chart-divider {
            background-color: #e0e3eb;
            border-color: #d1d4dc;
        }

        html.theme-light .modal-dialog {
            background: #ffffff;
            border-color: #e0e3eb;
        }

        html.theme-light .modal-input {
            background: #f0f3fa;
            border-color: #e0e3eb;
            color: #131722;
        }

        html.theme-light .modal-input:focus {
            border-color: var(--tv-color-blue);
        }

        html.theme-light .modal-input::placeholder {
            color: #6a6d78;
        }

        html.theme-light .modal-btn-cancel {
            border-color: #e0e3eb;
            color: #131722;
        }

        html.theme-light .modal-btn-cancel:hover {
            background: #f0f3fa;
        }

        html.theme-light ::-webkit-scrollbar-thumb {
            background: #c0c4cc;
        }

        html.theme-light ::-webkit-scrollbar-thumb:hover {
            background: #a0a4ac;
        }

        html.theme-light .script-editor-dock,
        html.theme-light .script-editor-header {
            background: #ffffff;
            border-top-color: #e0e3eb;
        }

        html.theme-light .script-editor-header:hover {
            background: #f0f3fa;
        }

        html.theme-light .script-editor-panel {
            background: #ffffff;
            border-top-color: #e0e3eb;
        }

        html.theme-light .script-editor-toolbar {
            background: #f0f3fa;
            border-bottom-color: #e0e3eb;
        }

        html.theme-light .script-editor-title {
            color: #131722;
        }

        html.theme-light .script-editor-active-name,
        html.theme-light .script-strategy-pnl {
            color: #6a6d78;
        }

        html.theme-light .script-btn {
            background: #ffffff;
            border-color: #e0e3eb;
            color: #131722;
        }

        html.theme-light .script-btn:hover {
            background: #f0f3fa;
            border-color: #d1d4dc;
        }

        html.theme-light .script-select {
            background: #ffffff;
            border-color: #e0e3eb;
            color: #131722;
        }

        html.theme-light .script-editor-resizer {
            background: #e0e3eb;
        }

        html.theme-light .script-editor-resizer:hover,
        html.theme-light body.script-resizing .script-editor-resizer {
            background: #2962ff;
        }

        html.theme-light .script-collapse-btn {
            color: #6a6d78;
        }

        html.theme-light .script-collapse-btn:hover {
            background: #e0e3eb;
            color: #131722;
        }

        /* Empty state */
        .empty-state {
            padding: 24px;
            text-align: center;
            color: var(--tv-color-text-secondary);
            font-size: 13px;
        }

        /* Override TradingView internal toolbar background color */
        #tv_chart_container iframe {
            background: #0F0F0F !important;
        }

        /* Layout Selector Popup */
        .layout-selector-popup {
            display: none;
            position: fixed;
            background: var(--tv-color-pane-background);
            border: 1px solid var(--tv-color-border);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .layout-selector-popup.is-open {
            display: block;
        }

        .layout-selector-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--tv-color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .layout-options {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }

        .layout-option {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: transparent;
            border: 1px solid var(--tv-color-border);
            border-radius: 6px;
            color: var(--tv-color-text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .layout-option:hover {
            background: var(--tv-color-toolbar-button-background-hover);
            color: var(--tv-color-item-active-text);
            border-color: var(--tv-color-item-active-text);
        }

        .layout-option.is-active {
            background: rgba(41, 98, 255, 0.15);
            border-color: var(--tv-color-blue);
            color: var(--tv-color-blue);
        }

        .layout-option svg {
            flex-shrink: 0;
        }

        /* Charts Layout Container */
        .charts-layout {

            height: 100%;
            background: #0F0F0F;
        }

        .charts-layout.layout-single {
            flex-direction: row;
        }

        .charts-layout.layout-vertical {
            flex-direction: column;
        }

            flex-direction: row;
        }

        .charts-layout.layout-left1-right2 {
            flex-direction: row;
        }

        .charts-layout.layout-left1-right2 .chart-cell:first-child {
            flex: 1;
        }

        .charts-layout.layout-left1-right2 .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .charts-layout.layout-left1-right2 .right-panel .chart-cell {
            flex: 1;
        }

        .chart-cell {
            background: #0F0F0F;
            position: relative;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
            flex: 1;
        }

        /* Disable iframe pointer events during divider drag */
        .chart-cell.no-pointer-events iframe {
            pointer-events: none;
        }

        /* Chart Divider (resizable) */
        .chart-divider {
            background-color: #3D3D3D;
            flex-shrink: 0;
            transition: background-color 0.2s;
            z-index: 10;
        }

        .chart-divider:hover {
            background-color: #5D5D5D;
        }

        .chart-divider.is-dragging {
            background-color: var(--tv-color-blue);
        }

        .charts-layout.layout-vertical .chart-divider {
            height: 6px;
            width: 100%;
            cursor: row-resize;
            border-top: 1px solid #131722;
            border-bottom: 1px solid #131722;
        }

        .charts-layout.layout-horizontal .chart-divider {
            width: 6px;
            height: 100%;
            cursor: col-resize;
            border-left: 1px solid #131722;
            border-right: 1px solid #131722;
        }

        /* Left1-Right2 layout dividers */
        .charts-layout.layout-left1-right2>.chart-divider {
            width: 6px;
            height: 100%;
            cursor: col-resize;
            border-left: 1px solid #131722;
            border-right: 1px solid #131722;
        }

        .charts-layout.layout-left1-right2 .right-panel .chart-divider {
            height: 6px;
            width: 100%;
            cursor: row-resize;
            border-top: 1px solid #131722;
            border-bottom: 1px solid #131722;
        }

        /* Modal Dialog */

            position: fixed;
            top: 0;
            left: 0;
            right: 0;

        };

        // ============ API URL Helper ============
        function getApiBaseUrl() {
            if (window.API_CONFIG && window.API_CONFIG.baseUrl) {
                const base = String(window.API_CONFIG.baseUrl).replace(/\/$/, '');
                if (base.startsWith('http://') || base.startsWith('https://')) {
                    return base;
                }
                if (base.startsWith('/')) {
                    return `${window.location.origin}${base}`;
                }
                return `${window.location.origin}/${base}`;
            }
            if (window.location.protocol === 'file:' || !window.location.host) {
                return 'http://localhost:3000';
            }
            return window.location.origin;
        }

        function getDatafeedFetchInit() {
            const init = { credentials: 'same-origin' };
            const token = localStorage.getItem('auth_token');
            if (token) {
                init.headers = { Authorization: `Bearer ${token}` };
            }
            return init;
        }

        function syncSessionCookie() {
            const email = localStorage.getItem('logged_in_email')
                || (() => {
                    try {
                        const user = JSON.parse(localStorage.getItem('auth_user') || 'null');
                        return user?.email || '';
                    } catch (e) {
                        return '';
                    }
                })();
            if (email) {
                document.cookie = `logged_in_email=${encodeURIComponent(email)}; path=/; max-age=${144 * 60 * 60}; SameSite=Lax`;
            }
        }

        function getWebSocketUrl() {
            const baseUrl = getApiBaseUrl();
            // Convert http(s) to ws(s)
            const wsUrl = baseUrl.replace(/^http/, 'ws');
            return `${wsUrl}/ws`;
        }

        // ============ WebSocket Manager for Real-time Updates ============
        class RealtimeManager {
            constructor() {
                this.ws = null;
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 10;
                this.reconnectDelay = 3000;
                this.subscribedSymbols = new Set();
                this.onKlineCallback = null;
            }

            connect() {
                const wsUrl = getWebSocketUrl();
                console.log('Connecting to WebSocket:', wsUrl);

                try {
                    this.ws = new WebSocket(wsUrl);

                    this.ws.onopen = () => {
                        console.log('WebSocket connected');
                        this.reconnectAttempts = 0;

                        // Re-subscribe to symbols after reconnect
                        if (this.subscribedSymbols.size > 0) {
                            this.subscribe([...this.subscribedSymbols]);
                        }
                    };

                    this.ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            this.handleMessage(msg);
                        } catch (e) {
                            console.error('Failed to parse WebSocket message:', e);
                        }
                    };

                    this.ws.onclose = (event) => {
                        console.log('WebSocket closed:', event.code, event.reason);
                        this.scheduleReconnect();
                    };

                    this.ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                    };
                } catch (e) {
                    console.error('Failed to create WebSocket:', e);
                    this.scheduleReconnect();
                }
            }

            scheduleReconnect() {
                if (this.reconnectAttempts < this.maxReconnectAttempts) {
                    this.reconnectAttempts++;
                    console.log(`Reconnecting in ${this.reconnectDelay}ms (attempt ${this.reconnectAttempts}/${this.maxReconnectAttempts})`);
                    setTimeout(() => this.connect(), this.reconnectDelay);
                } else {
                    console.error('Max reconnection attempts reached');
                }
            }

            subscribe(symbols) {
                symbols.forEach(s => this.subscribedSymbols.add(s.toUpperCase()));

                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'subscribe',
                        data: { symbols: symbols.map(s => s.toUpperCase()) }
                    }));
                }
            }

            unsubscribe(symbols) {
                symbols.forEach(s => this.subscribedSymbols.delete(s.toUpperCase()));

                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({
                        type: 'unsubscribe',
                        data: { symbols: symbols.map(s => s.toUpperCase()) }
                    }));
                }
            }

            handleMessage(msg) {
                switch (msg.type) {
                    case 'kline':
                        this.handleKlineUpdate(msg.data);
                        break;
                    case 'ticker':
                        this.handleTickerUpdate(msg.data);
                        break;
                    case 'pong':
                        // Heartbeat response
                        break;
                }
            }

            handleKlineUpdate(candle) {
                // Update watchlist prices - directly update DOM to avoid flickering
                if (watchlistManager) {
                    const list = watchlistManager.getCurrentList();
                    const item = list.find(i => i.symbol.toUpperCase() === candle.symbol.toUpperCase());
                    if (item) {
                        const oldPrice = item.last || candle.open;
                        item.last = candle.close;
                        // Calculate price change percentage
                        // Use daily open price for change calculation
                        const dailyOpen = dailyOpenPrices[candle.symbol.toUpperCase()];
                        if (dailyOpen > 0) {
                            item.change = candle.close - dailyOpen;
                            item.changePercent = ((candle.close - dailyOpen) / dailyOpen) * 100;
                        }
                        // Update DOM directly instead of full re-render
                        const row = document.querySelector(`.watchlist-item[data-symbol="${item.symbol}"]`);
                        if (row) {
                            const priceEl = row.querySelector('.item-last');
                            const changeEl = row.querySelector('.item-change');
                            if (priceEl) priceEl.textContent = candle.close.toFixed(2);
                            if (changeEl && item.changePercent !== undefined) {
                                const sign = item.changePercent >= 0 ? '+' : '';
                                changeEl.textContent = `${sign}${item.changePercent.toFixed(2)}%`;
                                changeEl.className = `item-change ${item.changePercent >= 0 ? 'positive' : 'negative'}`;
                            }
                        }
                    }
                }

                // Trigger chart update callback
                if (this.onKlineCallback) {
                    this.onKlineCallback(candle);
                }
            }

            handleTickerUpdate(ticker) {
                // Update watchlist with ticker data (keep for compatibility)
                if (watchlistManager) {
                    const list = watchlistManager.getCurrentList();
                    const item = list.find(i => i.symbol.toUpperCase() === ticker.symbol.toUpperCase());
                    if (item) {
                        item.last = ticker.price;
                        // Use daily open for change calculation
                        const dailyOpen = dailyOpenPrices[ticker.symbol.toUpperCase()];
                        if (dailyOpen > 0) {
                            item.change = ticker.price - dailyOpen;
                            item.changePercent = ((ticker.price - dailyOpen) / dailyOpen) * 100;
                        }
                        watchlistManager.saveToStorage();
                        watchlistManager.render();
                    }
                }
            }

            setKlineCallback(callback) {
                this.onKlineCallback = callback;
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
            }
        }

        // Global realtime manager instance
        let realtimeManager = null;

        // Daily open prices cache (UTC 00:00)
        let dailyOpenPrices = {};

        // ============ Fetch Supported Symbols from Backend ============
        async function fetchSupportedSymbols() {
            try {
                const res = await fetch(`${getApiBaseUrl()}/search?query=&limit=50`, getDatafeedFetchInit());
                if (res.ok) {
                    const results = await res.json();
                    return results.map(entry => ({
                        symbol: entry.symbol,
                        name: (entry.description || entry.symbol).replace(/\s+\d{6}$/, '').trim(),
                        last: 0,
                        change: 0,
                        changePercent: 0,
                        type: 'stock'
                    }));
                }
            } catch (e) {
                console.error('Failed to fetch symbols:', e);
            }
            return null;
        }

        async function fetchDailyOpens() {
            try {
                const res = await fetch(`${getApiBaseUrl()}/daily-opens`, getDatafeedFetchInit());
                if (res.ok) {
                    dailyOpenPrices = await res.json();
                }
            } catch (e) {
                console.error('Failed to fetch daily opens:', e);
            }
        }

        let quotePollTimer = null;

        async function pollWatchlistQuotes() {
            if (!watchlistManager) return;
            const symbols = new Set();
            Object.values(watchlistManager.lists).forEach(list => {
                list.forEach(item => symbols.add(normalizeSymbolInput(item.symbol).toLowerCase()));
            });
            const activeSymbol = (activeChartSymbolForTitle || getChartActiveSymbol()).toLowerCase();
            if (isValidAshareSymbol(activeSymbol)) {
                symbols.add(normalizeSymbolInput(activeSymbol).toLowerCase());
            }
            if (symbols.size === 0) return;

            try {
                const res = await fetch(
                    `${getApiBaseUrl()}/quotes?symbols=${encodeURIComponent([...symbols].join(','))}`,
                    getDatafeedFetchInit()
                );
                if (!res.ok) return;
                const quotes = await res.json();
                Object.entries(quotes).forEach(([symbol, quote]) => {
                    const key = normalizeSymbolInput(symbol).toLowerCase();
                    const lists = Object.values(watchlistManager.lists);
                    lists.forEach(list => {
                        const item = list.find(i => normalizeSymbolInput(i.symbol).toLowerCase() === key);
                        if (!item) return;
                        item.last = quote.last;
                        item.change = quote.change;
                        item.changePercent = quote.change_percent;
                        if (quote.name) item.name = quote.name;
                    });
                });
                watchlistManager.render();
                const activeQuote = quotes[normalizeSymbolInput(activeSymbol).toLowerCase()];
                if (activeQuote) updateChartTabTitleFromQuote(activeQuote);
            } catch (e) {
                console.warn('Quote poll failed:', e);
            }
        }

        function startQuotePolling() {
            if (quotePollTimer) clearInterval(quotePollTimer);
            pollWatchlistQuotes();
            quotePollTimer = setInterval(pollWatchlistQuotes, 5000);
        }

        function normalizeSymbolInput(raw) {
            const value = raw.trim().toLowerCase();
            const digits = value.replace(/\D/g, '');
            const code = digits.length >= 6 ? digits.slice(-6) : digits;
            if (code.length !== 6) return raw.trim().toUpperCase();
            if (value.startsWith('sh') || value.startsWith('sz')) {
                return `${value.slice(0, 2)}${code}`;
            }
            return code.startsWith('6') ? `sh${code}` : `sz${code}`;
        }

        const CHART_ACTIVE_SYMBOL_KEY = 'chart_active_symbol';

        function isValidAshareSymbol(symbol) {
            return /^(sh|sz)\d{6}$/.test(normalizeSymbolInput(symbol).toLowerCase());
        }

        function getChartActiveSymbol() {
            const saved = localStorage.getItem(CHART_ACTIVE_SYMBOL_KEY)
                || localStorage.getItem('watchlist_selected');
            if (saved && isValidAshareSymbol(saved)) {
                return normalizeSymbolInput(saved).toLowerCase();
            }
            return 'sh600519';
        }

        function saveChartActiveSymbol(symbol) {
            const normalized = normalizeSymbolInput(symbol);
            if (!isValidAshareSymbol(normalized)) return;
            const ticker = normalized.toLowerCase();
            localStorage.setItem(CHART_ACTIVE_SYMBOL_KEY, ticker);
            localStorage.setItem('watchlist_selected', ticker);
        }

        let activeChartSymbolForTitle = getChartActiveSymbol();
        let activeChartSymbolName = '';

        function formatChartTabTitle(name, last, change, changePercent) {
            if (!name) return '';
            const parts = [name];
            if (Number.isFinite(last)) {
                parts.push(last.toFixed(2));
            }
            if (Number.isFinite(change) && Number.isFinite(changePercent)) {
                parts.push(`${change.toFixed(2)}(${changePercent.toFixed(2)}%)`);
            }
            return parts.join(' ');
        }

        function updateChartTabTitleFromQuote(quote) {
            if (!quote) return;
            const name = quote.name || activeChartSymbolName || activeChartSymbolForTitle;
            if (quote.name) activeChartSymbolName = quote.name;
            document.title = formatChartTabTitle(
                name,
                quote.last,
                quote.change,
                quote.change_percent
            );
        }

        function onActiveChartSymbolChanged(symbol, name) {
            const normalized = normalizeSymbolInput(symbol).toLowerCase();
            if (!isValidAshareSymbol(normalized)) return;
            activeChartSymbolForTitle = normalized;
            if (name) activeChartSymbolName = name;
            document.title = name || normalized;
            pollActiveChartQuote();
        }

        async function pollActiveChartQuote() {
            const symbol = activeChartSymbolForTitle || getChartActiveSymbol();
            if (!isValidAshareSymbol(symbol)) return;

            try {
                const ticker = normalizeSymbolInput(symbol).toLowerCase();
                const res = await fetch(
                    `${getApiBaseUrl()}/quotes?symbols=${encodeURIComponent(ticker)}`,
                    getDatafeedFetchInit()
                );
                if (!res.ok) return;
                const quotes = await res.json();
                const quote = quotes[ticker];
                if (quote) updateChartTabTitleFromQuote(quote);
            } catch (e) {
                console.warn('Active symbol quote poll failed:', e);
            }
        }

        class WatchlistManager {
            constructor() {
                this.STORAGE_KEY = 'watchlist_data';
                this.DEFAULT_LISTS = {
                    '自选股': [],
                    '收藏': []
                };

                this.lists = this.loadFromStorage();
                this.currentListName = localStorage.getItem('watchlist_current') || '自选股';
                this.selectedSymbol = getChartActiveSymbol();
                this.isDropdownOpen = false;
                this.draggedItem = null;
            }

            loadFromStorage() {
                try {
                    const stored = localStorage.getItem(this.STORAGE_KEY);
                    return stored ? JSON.parse(stored) : { ...this.DEFAULT_LISTS };
                } catch (e) {
                    console.error('Failed to load watchlists:', e);
                    return { ...this.DEFAULT_LISTS };
                }
            }

            // Load supported symbols from backend and initialize default list
            async initFromBackend() {
                const symbols = await fetchSupportedSymbols();
                if (symbols && symbols.length > 0) {
                    if (!this.lists['自选股'] || this.lists['自选股'].length === 0) {
                        this.lists['自选股'] = symbols;
                        this.saveToStorage();
                    }
                    const allSymbols = symbols.map(s => s.symbol);
                    // Only reset if persisted symbol is malformed
                    if (!isValidAshareSymbol(this.selectedSymbol) && allSymbols.length > 0) {
                        this.selectedSymbol = allSymbols[0].symbol;
                        saveChartActiveSymbol(this.selectedSymbol);
                    }
                }
                this.render();
            }

            saveToStorage() {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.lists));
                    localStorage.setItem('watchlist_current', this.currentListName);
                    localStorage.setItem('watchlist_selected', this.selectedSymbol);
                } catch (e) {
                    console.error('Failed to save watchlists:', e);
                }
            }

            getCurrentList() {
                return this.lists[this.currentListName] || [];
            }

            getAllListNames() {
                return Object.keys(this.lists);
            }

            switchList(name) {
                if (this.lists[name]) {
                    this.currentListName = name;
                    this.saveToStorage();
                    this.render();
                    this.closeDropdown();
                }
            }

            createList(name) {
                if (name && name.trim() && !this.lists[name]) {
                    this.lists[name] = [];
                    this.switchList(name);
                    return true;
                }
                return false;
            }

            renameList(oldName, newName) {
                if (newName && newName.trim() && newName !== oldName && !this.lists[newName]) {
                    this.lists[newName] = this.lists[oldName];
                    delete this.lists[oldName];
                    if (this.currentListName === oldName) {
                        this.currentListName = newName;
                    }
                    this.saveToStorage();
                    this.render();
                    return true;
                }
                return false;
            }

            clearCurrentList() {
                this.lists[this.currentListName] = [];
                this.saveToStorage();
                this.render();
            }

            addSymbol(symbol, data = {}) {
                const list = this.getCurrentList();
                if (!list.find(item => item.symbol === symbol)) {
                    list.unshift({
                        symbol,
                        last: data.last || 0,
                        change: data.change || 0,
                        changePercent: data.changePercent || 0,
                        type: data.type || 'stock'
                    });
                    this.saveToStorage();
                    this.render();
                    return true;
                }
                return false;
            }

            removeSymbol(symbol) {
                this.lists[this.currentListName] = this.getCurrentList().filter(
                    item => item.symbol !== symbol
                );
                this.saveToStorage();
                this.render();
            }

            selectSymbol(symbol) {
                const normalized = normalizeSymbolInput(symbol).toLowerCase();
                this.selectedSymbol = normalized;
                saveChartActiveSymbol(normalized);
                const item = this.getCurrentList().find(i => normalizeSymbolInput(i.symbol).toLowerCase() === normalized);
                onActiveChartSymbolChanged(normalized, item?.name);
                this.saveToStorage();
                this.render();
                if (tvWidgets[selectedChartIndex]) {
                    const widget = tvWidgets[selectedChartIndex];
                    widget.setSymbol(normalized, widget.activeChart().resolution());
                }
            }

            reorderItems(fromIndex, toIndex) {
                const list = this.getCurrentList();
                const [item] = list.splice(fromIndex, 1);
                list.splice(toIndex, 0, item);
                this.saveToStorage();
                this.render();
            }

            toggleDropdown() {
                this.isDropdownOpen = !this.isDropdownOpen;
                const menu = document.getElementById('dropdownMenu');
                if (this.isDropdownOpen) {
                    this.renderDropdown();
                    menu.classList.add('is-open');
                } else {
                    menu.classList.remove('is-open');
                }
            }

            closeDropdown() {
                this.isDropdownOpen = false;
                document.getElementById('dropdownMenu').classList.remove('is-open');
            }

            formatNumber(num, decimals = 2) {
                return parseFloat(num).toFixed(decimals);
            }

            render() {
                const container = document.getElementById('listContent');
                const list = this.getCurrentList();

                document.getElementById('currentListName').textContent = this.currentListName;

                if (!list || list.length === 0) {
                    container.innerHTML = '<div class="empty-state">列表为空</div>';
                    return;
                }

                container.innerHTML = list.map((item, index) => {
                    const isUp = item.change >= 0;
                    const colorClass = isUp ? 'is-positive' : 'is-negative';
                    const sign = isUp ? '+' : '';
                    const isSelected = item.symbol === this.selectedSymbol;

                    return `
                        <div class="watchlist-item ${isSelected ? 'is-selected' : ''}"
                             draggable="true"
                             data-index="${index}"
                             data-symbol="${item.symbol}">
                            <div class="item-grip">
                                <svg width="8" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <circle cx="8" cy="4" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="8" cy="20" r="2"/>
                                    <circle cx="16" cy="4" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="16" cy="20" r="2"/>
                                </svg>
                            </div>
                            <div class="item-symbol">${item.name || item.symbol}</div>
                            <div class="item-values">
                                <div class="item-last ${colorClass}">${this.formatNumber(item.last, 2)}</div>
                                <div class="item-change ${colorClass}">${sign}${this.formatNumber(item.changePercent)}%</div>
                            </div>
                            <button class="item-remove" data-symbol="${item.symbol}">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    `;
                }).join('');

                // Attach event listeners
                this.attachItemEventListeners();
            }

            renderDropdown() {
                const container = document.getElementById('listsContainer');
                container.innerHTML = this.getAllListNames().map(name => {
                    const isActive = name === this.currentListName;
                    return `
                        <div class="dropdown-item ${isActive ? 'is-active' : ''}" data-list="${name}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="${isActive ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                            ${name}
                        </div>
                    `;
                }).join('');

                // Attach event listeners
                container.querySelectorAll('.dropdown-item').forEach(item => {
                    item.addEventListener('click', () => {
                        this.switchList(item.dataset.list);
                    });
                });
            }

            attachItemEventListeners() {
                const items = document.querySelectorAll('.watchlist-item');

                items.forEach(item => {
                    // Click to select symbol
                    item.addEventListener('click', (e) => {
                        if (!e.target.closest('.item-remove')) {
                            this.selectSymbol(item.dataset.symbol);
                        }
                    });

                    // Drag start
                    item.addEventListener('dragstart', (e) => {
                        this.draggedItem = {
                            index: parseInt(item.dataset.index),
                            element: item
                        };
                        item.classList.add('is-dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });

                    // Drag end
                    item.addEventListener('dragend', () => {
                        item.classList.remove('is-dragging');
                        document.querySelectorAll('.watchlist-item').forEach(el => {
                            el.classList.remove('drag-over-top', 'drag-over-bottom');
                        });
                        this.draggedItem = null;
                    });

                    // Remove button
                    const removeBtn = item.querySelector('.item-remove');
                    if (removeBtn) {
                        removeBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.removeSymbol(removeBtn.dataset.symbol);
                        });
                    }
                });
            }

            handleDragOver(e) {
                e.preventDefault();
                if (!this.draggedItem) return;

                const items = [...document.querySelectorAll('.watchlist-item:not(.is-dragging)')];
                items.forEach(i => i.classList.remove('drag-over-top', 'drag-over-bottom'));

                const afterElement = this.getDragAfterElement(e.clientY);
                if (afterElement) {
                    afterElement.classList.add('drag-over-top');
                } else if (items.length) {
                    items[items.length - 1].classList.add('drag-over-bottom');
                }
            }

            handleDrop(e) {
                e.preventDefault();
                if (!this.draggedItem) return;

                const afterElement = this.getDragAfterElement(e.clientY);
                let newIndex;

                if (!afterElement) {
                    newIndex = this.getCurrentList().length - 1;
                } else {
                    const targetIndex = parseInt(afterElement.dataset.index);
                    newIndex = this.draggedItem.index < targetIndex ? targetIndex - 1 : targetIndex;
                }

                if (newIndex !== this.draggedItem.index) {
                    this.reorderItems(this.draggedItem.index, newIndex);
                }
            }

            getDragAfterElement(y) {
                const items = [...document.querySelectorAll('.watchlist-item:not(.is-dragging)')];
                return items.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset, element: child };
                    }
                    return closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }
        }

        // Initialize watchlist manager
        const watchlistManager = new WatchlistManager();

        // ============ Custom Datafeed ============
        class CustomDatafeed {
            constructor(url) {
                this.url = String(url).replace(/\/$/, '');
                this.subscriptions = {};
                this._pollTimers = {};
                this._resolveSeq = 0;
                this._barsRequestSeq = 0;
                this._activeSymbol = null;
                this._quotePollTimers = {};
            }

            _normalizeTicker(raw) {
                if (!raw) return '';
                const value = String(raw).trim().toLowerCase();
                const digits = value.replace(/\D/g, '');
                const code = digits.length >= 6 ? digits.slice(-6) : digits;
                if (code.length !== 6) return value;
                if (value.startsWith('sh') || value.startsWith('sz')) {
                    return `${value.slice(0, 2)}${code}`;
                }
                return code.startsWith('6') ? `sh${code}` : `sz${code}`;
            }

            _buildSymbolInfo(info, requestedTicker, displayName) {
                const ticker = this._normalizeTicker(requestedTicker);
                const name = displayName || ticker;
                return {
                    symbol: ticker,
                    ticker,
                    name,
                    description: name,
                    full_name: info.full_name || ticker,
                    exchange: info.exchange || (ticker.startsWith('sh') ? 'SSE' : 'SZSE'),
                    listed_exchange: info.listed_exchange || info.exchange || (ticker.startsWith('sh') ? 'SSE' : 'SZSE'),
                    type: info.type || 'stock',
                    session: info.session || '0930-1500',
                    timezone: info.timezone || 'Asia/Shanghai',
                    minmov: info.minmov || 1,
                    pricescale: info.pricescale || 100,
                    has_intraday: true,
                    has_daily: true,
                    has_weekly_and_monthly: true,
                    supported_resolutions: info.supported_resolutions || ['1', '5', '15', '30', '60', 'D', 'W', 'M'],
                    data_status: 'streaming',
                };
            }

            _onSymbolChanged(nextSymbol) {
                const normalized = this._normalizeTicker(nextSymbol);
                if (this._activeSymbol === normalized) return;
                const root = getIndicatorDataRoot();
                if (this._activeSymbol) {
                    Object.keys(root.customIndicatorData || {}).forEach((key) => {
                        if (key.startsWith(`${this._activeSymbol}_`)) {
                            delete root.customIndicatorData[key];
                        }
                    });
                    syncCustomIndicatorDataToIframes();
                }
                this._activeSymbol = normalized;
            }

            _fetchJson(path) {
                return fetch(`${this.url}${path}`, getDatafeedFetchInit()).then(async (r) => {
                    if (r.status === 401) {
                        throw new Error('Unauthorized Account');
                    }
                    return r.json();
                });
            }

            onReady(cb) {
                this._fetchJson('/config').then(cfg => {
                    setTimeout(() => cb({
                        supported_resolutions: cfg.supported_resolutions || ['1', '5', '15', '30', '60', 'D', 'W', 'M'],
                        supports_marks: false,
                        supports_timescale_marks: false,
                        supports_time: true,
                        supports_quotes: true,
                    }), 0);
                }).catch(() => setTimeout(() => cb({
                    supported_resolutions: ['1', '5', '15', '30', '60', 'D', 'W', 'M'],
                    supports_quotes: true,
                }), 0));
            }

            searchSymbols(input, exchange, type, onResult) {
                this._fetchJson(`/search?query=${encodeURIComponent(input)}&limit=30`)
                    .then(onResult)
                    .catch(() => onResult([]));
            }

            resolveSymbol(name, onResolve, onError) {
                const requested = this._normalizeTicker(name);
                const seq = ++this._resolveSeq;
                this._onSymbolChanged(requested);
                this._barsRequestSeq += 1;

                this._fetchJson(`/symbols?symbol=${encodeURIComponent(requested)}`)
                    .then(info => {
                        if (seq !== this._resolveSeq) return;

                        const ticker = this._normalizeTicker(info.ticker || info.symbol || requested);
                        const displayName = (info.name || info.description || ticker).trim();

                        onActiveChartSymbolChanged(ticker, displayName);

                        const reqCode = requested.replace(/\D/g, '').slice(-6);
                        const tickCode = ticker.replace(/\D/g, '').slice(-6);
                        if (reqCode.length === 6 && tickCode.length === 6 && reqCode !== tickCode) {
                            onError(`Symbol mismatch: requested ${requested}, got ${ticker}`);
                            return;
                        }

                        onResolve(this._buildSymbolInfo(info, ticker, displayName));
                    })
                    .catch(e => {
                        if (seq !== this._resolveSeq) return;
                        onError(e.message);
                    });
            }

            _resolveTicker(symbolInfo) {
                return this._normalizeTicker(symbolInfo.ticker || symbolInfo.symbol);
            }

            getBars(symbolInfo, resolution, periodParams, onResult, onError) {
                const { from, to, countBack } = periodParams;
                const symbol = this._resolveTicker(symbolInfo);
                const requestSymbol = this._normalizeTicker(symbol);
                this._onSymbolChanged(requestSymbol);

                let path = `/history?symbol=${encodeURIComponent(symbol)}&resolution=${encodeURIComponent(resolution)}&from=${from}&to=${to}`;
                if (countBack) path += `&countback=${countBack}`;

                this._fetchJson(path).then(data => {
                    if (requestSymbol !== this._activeSymbol) return;
                    if (symbol !== this._resolveTicker(symbolInfo)) return;

                    if (data.s === 'no_data' || !data.t || !Array.isArray(data.t) || data.t.length === 0) {
                        const meta = { noData: true };
                        if (data.nextTime != null) meta.nextTime = data.nextTime;
                        return onResult([], meta);
                    }
                    if (data.s === 'error') return onError(data.errmsg || 'history error');
                    if (data.s !== 'ok') return onResult([], { noData: true });

                    const len = data.t.length;
                    if (len < 1 || !data.o || data.o.length !== len || !data.h || data.h.length !== len
                        || !data.l || data.l.length !== len || !data.c || data.c.length !== len
                        || !data.v || data.v.length !== len) {
                        return onResult([], { noData: true });
                    }

                    const bars = [];
                    const key = makeBarStoreKey(symbol, resolution);

                    for (let i = 0; i < len; i++) {
                        const time = data.t[i] * 1000;
                        bars.push({
                            time,
                            open: data.o[i],
                            high: data.h[i],
                            low: data.l[i],
                            close: data.c[i],
                            volume: data.v[i],
                        });
                    }
                    bars.sort((a, b) => a.time - b.time);
                    mergeBarsIntoStore(key, bars);
                    onResult(bars, { noData: false });
                }).catch(e => {
                    if (requestSymbol !== this._activeSymbol) return;
                    onError(e.message);
                });
            }

            _pollLatestBar(symbol, resolution, onTick, expectedSeq) {
                const now = Math.floor(Date.now() / 1000);
                const lookback = ['D', '1D', 'W', '1W', 'M', '1M'].includes(resolution) ? 86400 * 30 : 86400 * 3;
                const path = `/history?symbol=${encodeURIComponent(symbol)}&resolution=${encodeURIComponent(resolution)}&from=${now - lookback}&to=${now}&countback=2`;

                this._fetchJson(path).then(data => {
                    if (expectedSeq !== undefined && expectedSeq !== this._barsRequestSeq) return;
                    if (data.s !== 'ok' || !data.t || data.t.length === 0) return;
                    const i = data.t.length - 1;
                    const bar = {
                        time: data.t[i] * 1000,
                        open: data.o[i],
                        high: data.h[i],
                        low: data.l[i],
                        close: data.c[i],
                        volume: data.v[i]

                    const key = makeBarStoreKey(symbol, resolution);

        // ============ 用户脚本 / 指标策略编辑器 ============

        const DEFAULT_DUAL_MA_STRATEGY_SCRIPT = `// ========== 双均线交易策略模板（指标 + 策略信号）==========
// 修改 main 逻辑后点击【应用到图表】，指标线与买卖箭头将实时渲染到 K 线图

function sma(values, length) {
    if (!values || values.length < length) return NaN;
    const slice = values.slice(-length);
    return slice.reduce((sum, v) => sum + v, 0) / length;
}

return {
    id: 'UserDualMAStrategy@tv-basicstudies-1',
    name: '双均线交易策略',
    description: '双均线交易策略',

    inputs: [

        { id: 'slow_ma', title: '慢线 MA', type: 'line', color: '#2196F3' },

        let signal = 0;
        if (closes.length > slowLen) {

            if (!Number.isNaN(prevFast) && !Number.isNaN(prevSlow)

        const DEFAULT_MACD_SCRIPT = `// MACD 副图指标 — isPriceStudy: false → K 线下方独立副图区域
function ema(values, length) {
    if (!values || values.length < length) return NaN;
    const k = 2 / (length + 1);
    let prev = values.slice(0, length).reduce((a, b) => a + b, 0) / length;
    for (let i = length; i < values.length; i++) {
        prev = values[i] * k + prev * (1 - k);
    }
    return prev;
}

return {
    id: 'UserMACD@tv-basicstudies-1',
    name: '自定义 MACD',
    description: '自定义 MACD',
    shortDescription: 'MACD',
    isPriceStudy: false,
    inputs: [
        { id: 'fast', name: '快线', type: 'integer', defval: 12, min: 1, max: 200 },
        { id: 'slow', name: '慢线', type: 'integer', defval: 26, min: 1, max: 500 },
        { id: 'signal', name: '信号线', type: 'integer', defval: 9, min: 1, max: 200 },
    ],
    plots: [
        { id: 'macd', title: 'MACD', type: 'line', color: '#2196F3' },
        { id: 'signal', title: 'Signal', type: 'line', color: '#FF9800' },
        { id: 'hist', title: 'Histogram', type: 'histogram', color: '#26a69a' },
    ],
    main(context, inputs) {
        const fast = Number(inputs.fast) || 12;
        const slow = Number(inputs.slow) || 26;
        const sigLen = Number(inputs.signal) || 9;
        const closes = context.closes();
        if (closes.length < slow) return [NaN, NaN, NaN];

        const macdSeries = [];
        for (let i = slow; i <= closes.length; i++) {
            const slice = closes.slice(0, i);
            const fastEma = ema(slice, fast);
            const slowEma = ema(slice, slow);
            if (Number.isNaN(fastEma) || Number.isNaN(slowEma)) {
                macdSeries.push(NaN);
            } else {
                macdSeries.push(fastEma - slowEma);
            }
        }
        const macdVal = macdSeries[macdSeries.length - 1];
        const signalVal = ema(macdSeries.filter(v => !Number.isNaN(v)), sigLen);
        const hist = Number.isNaN(macdVal) || Number.isNaN(signalVal) ? NaN : macdVal - signalVal;
        return [macdVal, signalVal, hist];
    },
};`;

                || info?.name || sym?.name || 'sh600519';
            raw = String(raw);
            if (raw.includes(':')) {

                if (code.length === 6) {

        function resolveBarIndexForContext(ctx, bars) {
            const sym = ctx?.symbol;
            if (!sym) return -1;

            if (typeof sym.index === 'number' && sym.index >= 0) {
                if (!bars.length) return sym.index;
                return Math.min(sym.index, bars.length - 1);
            }

            if (!bars.length) return -1;

            const timeIdx = findBarIndex(bars, resolveBarTime(sym));
            if (timeIdx >= 0) return timeIdx;

            return -1;
        }

        function findBarIndex(bars, symbolTime) {
            if (!bars.length || symbolTime == null || Number.isNaN(symbolTime)) return -1;

            const ms = normalizeBarTime(symbolTime);
            if (ms == null) return -1;

            for (let i = 0; i < bars.length; i++) {
                if (bars[i].time === ms || bars[i].time === symbolTime) return i;
            }

            const targetDay = Math.floor(ms / 86400000);
            for (let i = bars.length - 1; i >= 0; i--) {
                if (Math.floor(bars[i].time / 86400000) === targetDay) return i;
            }

            let lo = 0;
            let hi = bars.length - 1;
            let result = -1;
            while (lo <= hi) {
                const mid = (lo + hi) >> 1;
                if (bars[mid].time <= ms) {
                    result = mid;
                    lo = mid + 1;
                } else {
                    hi = mid - 1;
                }
            }
            return result;
