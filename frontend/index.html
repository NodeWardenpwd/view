        function buildBarsFromStore(store, key) {
            let raw = store[key] || {};
            if (Object.keys(raw).length === 0) {
                const alt = key.replace(/_D$/, '_1D').replace(/_W$/, '_1W').replace(/_M$/, '_1M');
                if (alt !== key) raw = store[alt] || {};
            }
            return Object.keys(raw)
                .map(Number)
                .sort((a, b) => a - b)
                .map(time => ({ time, ...raw[time] }));
        }

        function smaFromCloses(closes, length) {
            if (!closes || closes.length < length) return NaN;
            const slice = closes.slice(-length);
            return slice.reduce((sum, v) => sum + v, 0) / length;
        }

        function simulateDualMaStrategyReturn(bars, fastLen, slowLen) {
            if (!bars || bars.length < slowLen + 2) return null;
            let position = 0;
            let entryPrice = 0;
            let equity = 1;
            let prevFast = NaN;
            let prevSlow = NaN;

            for (let i = 0; i < bars.length; i++) {
                const closes = bars.slice(0, i + 1).map(b => b.close);
                const fast = smaFromCloses(closes, fastLen);
                const slow = smaFromCloses(closes, slowLen);

                if (i > 0 && !Number.isNaN(prevFast) && !Number.isNaN(prevSlow)
                    && !Number.isNaN(fast) && !Number.isNaN(slow)) {
                    if (prevFast <= prevSlow && fast > slow && position === 0) {
                        position = 1;
                        entryPrice = bars[i].close;
                    } else if (prevFast >= prevSlow && fast < slow && position === 1) {
                        equity *= bars[i].close / entryPrice;
                        position = 0;
                        entryPrice = 0;
                    }
                }
                prevFast = fast;
                prevSlow = slow;
            }

            if (position === 1 && entryPrice > 0) {
                equity *= bars[bars.length - 1].close / entryPrice;
            }
            return (equity - 1) * 100;
        }

        function getVisibleBarsForBacktest() {
            const widget = tvWidgets[selectedChartIndex];
            if (!widget || !widget._ready) return null;
            try {
                const chart = widget.activeChart();
                const symbol = chart.symbol();
                const resolution = chart.resolution();
                const key = makeBarStoreKey(symbol, resolution);
                const rootStore = getIndicatorDataRoot().customIndicatorData || {};
                const bucket = rootStore[key];
                if (!bucket) return null;
                return Object.keys(bucket)
                    .map(Number)
                    .sort((a, b) => a - b)
                    .map(time => bucket[time]);
            } catch (e) {
                return null;
            }
        }

        function updateStrategyPnlDisplay(pnl, label) {
            const el = document.getElementById('scriptStrategyPnl');
            if (!el) return;
            el.classList.remove('is-positive', 'is-negative');
            if (pnl === null || pnl === undefined || Number.isNaN(pnl)) {
                el.textContent = `${label || '模拟累计收益率'}: --`;
                return;
            }
            const sign = pnl >= 0 ? '+' : '';
            el.textContent = `${label || '模拟累计收益率'}: ${sign}${pnl.toFixed(2)}%`;
            el.classList.add(pnl >= 0 ? 'is-positive' : 'is-negative');
        }

        function runStrategyBacktestForDefinition(definition) {
            const bars = getVisibleBarsForBacktest();
            if (!bars || bars.length === 0) {
                updateStrategyPnlDisplay(null);
                return;
            }
            const fastLen = Number(definition.inputs?.find(i => i.id === 'fastLen')?.defval) || 5;
            const slowLen = Number(definition.inputs?.find(i => i.id === 'slowLen')?.defval) || 20;
            const pnl = simulateDualMaStrategyReturn(bars, fastLen, slowLen);
            updateStrategyPnlDisplay(pnl);
            console.log(`[策略回测] ${definition.name} | 屏幕 K 线 ${bars.length} 根 | 模拟累计收益率 ${pnl?.toFixed(2)}%`);
        }

        function normalizeStudyPlotOutput(result, plotDefs) {
            const plotIds = (plotDefs || []).map(p => p.id);
            const items = Array.isArray(result) ? result : [result];
            const values = [];
            for (let i = 0; i < plotIds.length; i++) {
                const item = items[i];
                if (typeof item === 'number') {
                    values.push(item);
                } else if (item && typeof item === 'object') {
                    const id = plotIds[i];
                    if (id && typeof item[id] === 'number') {
                        values.push(item[id]);
                    } else {
                        const num = Object.values(item).find(v => typeof v === 'number');
                        values.push(typeof num === 'number' ? num : NaN);
                    }
                } else {
                    values.push(NaN);
                }
            }
            return values;
        }

        function buildPlotStyleDefaults(plot) {
            if (plot.type === 'shapes') {
                return {
                    plottype: plot.shape || 'shape_arrow_up',
                    location: plot.location || 'BelowBar',
                    color: plot.color || '#26a69a',
                    textColor: plot.textColor || '#ffffff',
                    size: plot.size || 'small',
                };
            }
            if (plot.type === 'histogram') {
                return {
                    linestyle: 0,
                    linewidth: 1,
                    plottype: 5,
                    transparency: 0,
                    color: plot.color || '#2196F3',
                };
            }
            return {
                linestyle: 0,
                linewidth: 2,
                plottype: 0,
                transparency: 0,
                color: plot.color || '#2196F3',
            };
        }

        function createCustomIndicatorFromDefinition(definition) {
            const def = definition;
            const plotCount = def.plots.length;
            const onMainChart = resolvePriceStudyFlags(def);
            const displayName = def.description || def.name;
            const studyId = def.id || `${String(def.name).replace(/\s+/g, '')}@tv-basicstudies-1`;
            const userDefaults = def.defaults || {};
            const userStyles = def.styles || {};

            return {
                name: def.name,
                metainfo: {
                    _metainfoVersion: 52,
                    id: studyId,
                    name: def.name,
                    description: displayName,
                    shortDescription: def.shortDescription || displayName,
                    is_hidden_study: false,
                    is_price_study: onMainChart,
                    linkedToSeries: onMainChart,
                    isCustomIndicator: true,
                    format: { type: onMainChart ? 'price' : 'volume', precision: 2 },
                    inputs: (def.inputs || []).map(input => ({
                        id: input.id,
                        name: input.name,
                        type: input.type || 'integer',
                        defval: input.defval,
                        min: input.min,
                        max: input.max,
                    })),
                    plots: def.plots.map(plot => ({
                        id: plot.id,
                        type: plot.type === 'shapes' ? 'shapes'
                            : (userStyles[plot.id]?.type === 'histogram' ? 'histogram' : (plot.type || 'line')),
                    })),
                    defaults: {
                        styles: userDefaults.styles || Object.fromEntries(def.plots.map(plot => [plot.id, buildPlotStyleDefaults(plot)])),
                        inputs: userDefaults.inputs || Object.fromEntries((def.inputs || []).map(input => [input.id, input.defval])),
                    },
                    styles: Object.fromEntries(def.plots.map(plot => [
                        plot.id,
                        userStyles[plot.id] || { title: plot.title || plot.id },
                    ])),
                },
                constructor: function () {
                    this._pine = null;
                    this.init = function (ctx, inp) {
                        this._context = ctx;
                        this._input = inp;
                        this._pine = (typeof PineJS !== 'undefined' ? PineJS : null)
                            || window.PineJS
                            || (window.parent && window.parent.PineJS)
                            || null;
                        const root = getIndicatorDataRoot();
                        delete root._macd_final_cache;
                        if (typeof window !== 'undefined') delete window._macd_final_cache;
                        const depth = Math.max(
                            Number(inp.slow) || Number(inp.slowLen) || 26,
                            Number(inp.fast) || Number(inp.fastLen) || 12,
                        ) + (Number(inp.signal) || 9) + 50;
                        if (ctx && typeof ctx.setMinimumAdditionalDepth === 'function') {
                            ctx.setMinimumAdditionalDepth(depth);
                        }
                    };
                    this.main = function (ctx, inp) {
                        upsertSymbolBarToStore(ctx);
                        const { key, store } = getIndicatorBarStore(ctx);
                        let bars = buildBarsFromStore(store, key);
                        let idx = resolveBarIndexForContext(ctx, bars);

                        const sym = ctx.symbol;
                        if (idx < 0 && sym && typeof sym.index === 'number' && sym.index >= 0) {
                            idx = sym.index;
                        }

                        if (idx < 0) {
                            return new Array(plotCount).fill(NaN);
                        }

                        if (bars.length <= idx && sym) {
                            const t = resolveBarTime(sym);
                            if (t != null) {
                                mergeBarsIntoStore(key, [{
                                    time: t,
                                    open: sym.open,
                                    high: sym.high,
                                    low: sym.low,
                                    close: sym.close,
                                    volume: sym.volume || 0,
                                }]);
                                bars = buildBarsFromStore(store, key);
                                idx = resolveBarIndexForContext(ctx, bars);
                                if (idx < 0 && typeof sym.index === 'number') idx = Math.min(sym.index, bars.length - 1);
                            }
                        }

                        if (idx < 0 || !bars.length) {
                            return new Array(plotCount).fill(NaN);
                        }

                        const history = bars.slice(0, idx + 1);
                        const bar = bars[idx] || {
                            time: resolveBarTime(sym),
                            open: sym?.open,
                            high: sym?.high,
                            low: sym?.low,
                            close: sym?.close,
                            volume: sym?.volume || 0,
                        };
                        const closePrice = bar?.close ?? sym?.close ?? NaN;

                        const context = {
                            time: resolveBarTime(sym),
                            bar,
                            bars: history,
                            barIndex: idx,
                            currentIndex: idx,
                            is_first_bar: idx === 0,
                            isFirstBar: !!(sym?.isLastBar || idx === bars.length - 1),
                            isLastBar: !!(sym?.isLastBar || idx === bars.length - 1),
                            close: closePrice,
                            open: bar?.open ?? sym?.open,
                            high: bar?.high ?? sym?.high,
                            low: bar?.low ?? sym?.low,
                            volume: bar?.volume ?? sym?.volume,
                            PineJS: this._pine || window.PineJS,
                            opens: () => history.map(b => b.open),
                            highs: () => history.map(b => b.high),
                            lows: () => history.map(b => b.low),
                            closes: () => history.map(b => b.close),
                            volumes: () => history.map(b => b.volume),
                            input: (name) => inp[name],
                            reportStrategyPnl: () => {
                                if (sym?.isLastBar || idx === bars.length - 1) {
                                    setTimeout(() => runStrategyBacktestForDefinition(def), 0);
                                }
                            },
                        };

                        const result = def.main(context, inp);
                        return normalizeStudyPlotOutput(result, def.plots);
                    };
                },
            };
        }

        function rebuildUserScriptRegistry(PineJS) {
            USER_SCRIPT_REGISTRY.length = 0;
            buildCustomIndicators(PineJS || window.PineJS || null)
                .forEach((indicator) => USER_SCRIPT_REGISTRY.push(indicator));
        }

        function getCustomIndicators(PineJS) {
            window.PineJS = PineJS;
            rebuildUserScriptRegistry(PineJS);
            return USER_SCRIPT_REGISTRY.slice();
        }

        const ScriptEditorManager = {
            store: null,
            collapsed: false,
            savedPanelHeight: 280,

            initStore() {
                this.store = seedDefaultUserScriptIfEmpty(loadUserScriptsStore());
                if (!this.store.activeId || !this.store.scripts[this.store.activeId]) {
                    const firstId = Object.keys(this.store.scripts)[0];
                    this.store.activeId = firstId || null;

                saveUserScriptsStore(this.store);

            refreshSelector() {
                const select = document.getElementById('scriptSelector');
                if (!select) return;
                const scripts = Object.values(this.store.scripts)
                    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                select.innerHTML = scripts.map(s =>
                    `<option value="${escapeHtml(s.id)}"${s.id === activeScriptId ? ' selected' : ''}>${escapeHtml(s.name)}</option>`
                ).join('');

            setCollapsed(collapsed, persist = true) {
                this.collapsed = collapsed;
                const dock = document.getElementById('scriptEditorDock');
                const panel = document.getElementById('scriptEditorPanel');
                const toggleBtn = document.getElementById('btnToggleScriptPanel');
                if (!dock) return;

                if (!collapsed && panel) {
                    panel.style.height = `${this.savedPanelHeight}px`;

            toggleCollapsed() {
                this.setCollapsed(!this.collapsed);
            },

            loadCollapsedPreference() {
                const saved = localStorage.getItem(SCRIPT_PANEL_COLLAPSED_KEY);
                this.setCollapsed(saved === '1', false);
            },

            loadScriptToEditor(id) {
                const entry = this.store.scripts[id];
                if (!entry || !monacoEditor) return;
                activeScriptId = id;
                this.store.activeId = id;
                saveUserScriptsStore(this.store);
                monacoEditor.setValue(entry.code);
                this.refreshSelector();
                try {
                    const def = compileUserScript(entry.code, window.PineJS || null);
                    runStrategyBacktestForDefinition(def);
                } catch (e) {
                    updateStrategyPnlDisplay(null);
                }
            },

            getCurrentCode() {
                return monacoEditor ? monacoEditor.getValue() : '';

            async newScript() {
                const name = await showInputModal('新建脚本名称', '我的指标策略', '例如：双均线策略');
                if (!name) return;
                const slug = name.replace(/[^\w\u4e00-\u9fa5]+/g, '_').slice(0, 24) || 'Script';
                const id = `User${slug}${Date.now()}@tv-basicstudies-1`;
                const code = DEFAULT_DUAL_MA_STRATEGY_SCRIPT
                    .replace('UserDualMAStrategy@tv-basicstudies-1', id)
                    .replace("'双均线交易策略'", `'${name}'`)
                    .replace('双均线交易策略', name);
                this.store.scripts[id] = { id, name, code, updatedAt: Date.now() };
                this.store.activeId = id;
                activeScriptId = id;
                saveUserScriptsStore(this.store);
                rebuildUserScriptRegistry(window.PineJS || null);
                this.refreshSelector();
                if (monacoEditor) monacoEditor.setValue(code);
            },

            async saveCurrentScript() {
                const code = this.getCurrentCode();
                let definition;
                try {
                    definition = compileUserScript(code, window.PineJS || null);
                } catch (e) {
                    alert(`脚本解析失败：${e.message}`);
                    return;
                }

                let id = activeScriptId;
                let name = definition.name;

                if (!id || !this.store.scripts[id]) {
                    const inputName = await showInputModal('保存脚本名称', name, '请输入脚本名称');
                    if (!inputName) return;
                    name = inputName;
                    const slug = name.replace(/[^\w\u4e00-\u9fa5]+/g, '_').slice(0, 24) || 'Script';
                    id = definition.id && this.store.scripts[definition.id]
                        ? definition.id
                        : `User${slug}${Date.now()}@tv-basicstudies-1`;
                }

                definition.id = id;
                definition.name = name;

                this.store.scripts[id] = {
                    id,
                    name,
                    code: this.getCurrentCode(),
                    updatedAt: Date.now(),
                };
                this.store.activeId = id;
                activeScriptId = id;
                saveUserScriptsStore(this.store);
                rebuildUserScriptRegistry(window.PineJS || null);
                this.refreshSelector();
                alert(`脚本「${name}」已保存`);
            },

            async deleteCurrentScript() {
                if (!activeScriptId || !this.store.scripts[activeScriptId]) {
                    alert('没有可删除的脚本');
                    return;
                }

                const entry = this.store.scripts[activeScriptId];
                if (!confirm(`确定删除脚本「${entry.name}」？\n删除后无法恢复。`)) {
                    return;
                }

                delete this.store.scripts[activeScriptId];

                const remainingIds = Object.keys(this.store.scripts);
                if (remainingIds.length === 0) {
                    this.store = seedDefaultUserScriptIfEmpty({ activeId: null, scripts: {} });
                } else {
                    this.store.activeId = remainingIds[0];
                }

                activeScriptId = this.store.activeId;
                saveUserScriptsStore(this.store);
                rebuildUserScriptRegistry(window.PineJS || null);
                this.refreshSelector();

                if (activeScriptId) {
                    this.loadScriptToEditor(activeScriptId);
                } else if (monacoEditor) {
                    monacoEditor.setValue(DEFAULT_DUAL_MA_STRATEGY_SCRIPT);
                }

                updateStrategyPnlDisplay(null);
                clearAppliedStudy();
            },

            async applyToChart() {
                const code = this.getCurrentCode();
                const studyName = extractStudyDescriptionFromCode(code);
                if (!studyName) {
                    alert('请在脚本中设置 description: "你的指标名"（createStudy 将使用该名称）');
                    return;
                }

                try {
                    parseScriptToCustomIndicator(code, window.PineJS || null);
                } catch (e) {
                    alert(`无法应用：${e.message}`);
                    return;
                }

                const definition = compileUserScript(code, window.PineJS || null);

                if (activeScriptId) {
                    this.store.scripts[activeScriptId] = {
                        id: activeScriptId,
                        name: studyName,
                        code,
                        updatedAt: Date.now(),
                    };
                    this.store.activeId = activeScriptId;
                    saveUserScriptsStore(this.store);
                    this.updateActiveName();
                }

                rebuildUserScriptRegistry(window.PineJS || null);
                runStrategyBacktestForDefinition(definition);

                saveAppliedStudy(studyName, activeScriptId);
                pendingApplyStudy = true;
                await reloadWidgetForScripts(selectedChartIndex);
            },

            bindEvents() {
                document.getElementById('btnNewScript')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.newScript();
                });
                document.getElementById('btnSaveScript')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.saveCurrentScript();
                });
                document.getElementById('btnDeleteScript')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.deleteCurrentScript();
                });
                document.getElementById('btnApplyScript')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.applyToChart();
                });
                document.getElementById('scriptSelector')?.addEventListener('change', (e) => {
                    e.stopPropagation();
                    this.loadScriptToEditor(e.target.value);
                });
                document.getElementById('scriptSelector')?.addEventListener('click', (e) => e.stopPropagation());

                const header = document.getElementById('scriptEditorHeader');
                const toggleBtn = document.getElementById('btnToggleScriptPanel');
                toggleBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleCollapsed();
                });
                header?.addEventListener('click', () => this.toggleCollapsed());
            },

            initMonacoEditor() {
                return new Promise((resolve, reject) => {
                    if (typeof require === 'undefined') {
                        reject(new Error('Monaco loader unavailable'));
                        return;
                    }
                    require.config({
                        paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' },
                    });
                    require(['vs/editor/editor.main'], () => {
                        const container = document.getElementById('monacoEditorContainer');
                        if (!container) {
                            reject(new Error('Monaco container missing'));
                            return;
                        }
                        const initial = activeScriptId && this.store.scripts[activeScriptId]
                            ? this.store.scripts[activeScriptId].code
                            : DEFAULT_DUAL_MA_STRATEGY_SCRIPT;
                        monacoEditor = monaco.editor.create(container, {
                            value: initial,
                            language: 'javascript',
                            theme: isDarkTheme ? 'vs-dark' : 'vs',
                            automaticLayout: true,
                            minimap: { enabled: false },
                            fontSize: 13,
                            scrollBeyondLastLine: false,
                            wordWrap: 'on',
                            tabSize: 4,
                        });
                        resolve();
                    }, reject);
                });
            },

            initResizer() {
                const resizer = document.getElementById('scriptEditorResizer');
                const panel = document.getElementById('scriptEditorPanel');
                if (!resizer || !panel) return;

                let dragging = false;
                let startY = 0;
                let startHeight = 0;

                resizer.addEventListener('mousedown', (e) => {
                    if (this.collapsed) return;
                    dragging = true;
                    startY = e.clientY;
                    startHeight = panel.getBoundingClientRect().height;
                    document.body.classList.add('script-resizing');
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => {
                    if (!dragging || this.collapsed) return;
                    const delta = startY - e.clientY;
                    const next = Math.min(window.innerHeight * 0.55, Math.max(120, startHeight + delta));
                    panel.style.height = `${next}px`;
                    this.savedPanelHeight = next;
                });

                document.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    document.body.classList.remove('script-resizing');
                    if (monacoEditor) {
                        try { monacoEditor.layout(); } catch (e) { /* ignore */ }
                    }
                });
            },

            async init() {
                this.initStore();
                rebuildUserScriptRegistry(null);
                this.refreshSelector();
                this.bindEvents();
                this.initResizer();
                this.loadCollapsedPreference();
                try {
                    await this.initMonacoEditor();
                    if (activeScriptId) {
                        try {
                            runStrategyBacktestForDefinition(compileUserScript(this.getCurrentCode(), window.PineJS || null));
                        } catch (e) { /* ignore */ }
                    }
                } catch (e) {
                    console.error('Monaco Editor init failed:', e);
                }
            },
        };

        async function reloadWidgetForScripts(index) {
            const oldWidget = tvWidgets[index];
            if (!oldWidget) return;
            let symbol = getChartActiveSymbol();
            let interval = '1D';
            try {
                symbol = oldWidget.activeChart().symbol();
                interval = oldWidget.activeChart().resolution();
            } catch (e) { /* use defaults */ }

            try {
                oldWidget.remove();
            } catch (e) { /* ignore */ }

            pendingApplyStudy = true;
            createWidget(index, symbol, interval);
            selectChart(index);

            const waitReady = () => new Promise((resolve) => {
                const widget = tvWidgets[index];
                if (!widget) return resolve(false);
                if (widget._ready) return resolve(true);
                const started = Date.now();
                const timer = setInterval(() => {
                    if (widget._ready || Date.now() - started > 15000) {
                        clearInterval(timer);
                        resolve(!!widget._ready);
                    }
                }, 200);
            });

            await waitReady();
        }

        function initThemePreference() {
            const saved = localStorage.getItem(UI_THEME_KEY);
            if (saved === 'light' || saved === 'dark') {
                isDarkTheme = saved === 'dark';
            } else {
                isDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            document.documentElement.classList.toggle('theme-dark', isDarkTheme);
            document.documentElement.classList.toggle('theme-light', !isDarkTheme);
            document.documentElement.dataset.theme = isDarkTheme ? 'dark' : 'light';
            syncScriptEditorTheme();

            if (!localStorage.getItem(UI_THEME_KEY)) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (localStorage.getItem(UI_THEME_KEY)) return;
                    isDarkTheme = e.matches;
                    document.documentElement.classList.toggle('theme-dark', isDarkTheme);
                    document.documentElement.classList.toggle('theme-light', !isDarkTheme);

        // ============ Modal Dialog ============
        function showInputModal(title, defaultValue = '', placeholder = '请输入名称...') {
            return new Promise((resolve) => {
                const modal = document.getElementById('inputModal');
                const titleEl = document.getElementById('modalTitle');
                const input = document.getElementById('modalInput');
                const confirmBtn = document.getElementById('modalConfirm');
                const cancelBtn = document.getElementById('modalCancel');

                titleEl.textContent = title;
                input.value = defaultValue;
                input.placeholder = placeholder;
                modal.classList.add('is-open');
                input.focus();
                input.select();

                const cleanup = () => {
                    modal.classList.remove('is-open');
                    confirmBtn.removeEventListener('click', onConfirm);
                    cancelBtn.removeEventListener('click', onCancel);
                    input.removeEventListener('keydown', onKeydown);
                    modal.removeEventListener('click', onOverlayClick);
                };

                const onConfirm = () => {
                    cleanup();
                    resolve(input.value.trim());
                };

                const onCancel = () => {
                    cleanup();
                    resolve(null);
                };

                const onKeydown = (e) => {
                    if (e.key === 'Enter') onConfirm();
                    if (e.key === 'Escape') onCancel();
                };

                const onOverlayClick = (e) => {
                    if (e.target === modal) onCancel();
                };

                confirmBtn.addEventListener('click', onConfirm);
                cancelBtn.addEventListener('click', onCancel);
                input.addEventListener('keydown', onKeydown);
                modal.addEventListener('click', onOverlayClick);
            });
        }

        // ============ Save/Load Adapter ============
        function getAuthHeaders() {
            const user = getAuthUser();
            return user ? { 'X-User-Id': user.sub } : {};
        }

        function createSaveLoadAdapter() {
            const CHARTS_INDEX_KEY = 'tv_charts_index';
            const STUDY_TPL_KEY = 'tv_study_templates';
            const DRAWING_TPL_KEY = 'tv_drawing_templates';
            const CHART_TPL_KEY = 'tv_chart_templates';

            function getStore(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
            function setStore(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
            function getStoreObj(key) { return JSON.parse(localStorage.getItem(key) || '{}'); }
            function setStoreObj(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

            let nextId = Date.now();

            return {
                getAllCharts() {
                    return Promise.resolve(getStore(CHARTS_INDEX_KEY));
                },

                saveChart(chartData) {
                    const index = getStore(CHARTS_INDEX_KEY);
                    const id = chartData.id || nextId++;
                    const content = chartData.content;
                    const symbol = chartData.symbol;
                    const name = chartData.name;

                    const existing = index.findIndex(c => c.id === id);
                    const meta = { id, name, symbol, resolution: chartData.resolution, timestamp: Math.floor(Date.now() / 1000) };
                    if (existing >= 0) index[existing] = meta;
                    else index.push(meta);
                    setStore(CHARTS_INDEX_KEY, index);

                    return fetch(`${getApiBaseUrl()}/canvas/save`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                        body: JSON.stringify({ symbol, name: String(id), data: JSON.parse(content) })
                    }).then(() => id);
                },

                getChartContent(chartId) {
                    const index = getStore(CHARTS_INDEX_KEY);
                    const chart = index.find(c => c.id == chartId);
                    if (!chart) return Promise.reject('Chart not found');
                    return fetch(`${getApiBaseUrl()}/canvas/load?symbol=${chart.symbol}&name=${chartId}`, {
                        headers: getAuthHeaders()
                    }).then(r => r.text());
                },

                removeChart(id) {
                    const index = getStore(CHARTS_INDEX_KEY);
                    const chart = index.find(c => c.id == id);
                    const newIndex = index.filter(c => c.id != id);
                    setStore(CHARTS_INDEX_KEY, newIndex);
                    if (chart) {
                        return fetch(`${getApiBaseUrl()}/canvas/delete?symbol=${chart.symbol}&name=${id}`, {
                            method: 'DELETE', headers: getAuthHeaders()
                        }).then(() => {});
                    }
                    return Promise.resolve();
                },

                getAllStudyTemplates() { return Promise.resolve(getStore(STUDY_TPL_KEY)); },
                saveStudyTemplate(data) {
                    const list = getStore(STUDY_TPL_KEY);
                    const existing = list.findIndex(t => t.name === data.name);
                    if (existing >= 0) list[existing] = data;
                    else list.push(data);
                    setStore(STUDY_TPL_KEY, list);
                    const contents = getStoreObj(STUDY_TPL_KEY + '_content');
                    contents[data.name] = data.content;
                    setStoreObj(STUDY_TPL_KEY + '_content', contents);
                    return Promise.resolve();
                },
                removeStudyTemplate(info) {
                    setStore(STUDY_TPL_KEY, getStore(STUDY_TPL_KEY).filter(t => t.name !== info.name));
                    const contents = getStoreObj(STUDY_TPL_KEY + '_content');
                    delete contents[info.name];
                    setStoreObj(STUDY_TPL_KEY + '_content', contents);
                    return Promise.resolve();
                },
                getStudyTemplateContent(info) {
                    const contents = getStoreObj(STUDY_TPL_KEY + '_content');
                    return Promise.resolve(contents[info.name] || '');
                },

                getDrawingTemplates(toolName) {
                    const all = getStoreObj(DRAWING_TPL_KEY);
                    return Promise.resolve(Object.keys(all[toolName] || {}));
                },
                loadDrawingTemplate(toolName, templateName) {
                    const all = getStoreObj(DRAWING_TPL_KEY);
                    return Promise.resolve((all[toolName] || {})[templateName] || '');
                },
                saveDrawingTemplate(toolName, templateName, content) {
                    const all = getStoreObj(DRAWING_TPL_KEY);
                    if (!all[toolName]) all[toolName] = {};
                    all[toolName][templateName] = content;
                    setStoreObj(DRAWING_TPL_KEY, all);
                    return Promise.resolve();
                },
                removeDrawingTemplate(toolName, templateName) {
                    const all = getStoreObj(DRAWING_TPL_KEY);
                    if (all[toolName]) delete all[toolName][templateName];
                    setStoreObj(DRAWING_TPL_KEY, all);
                    return Promise.resolve();
                },

                getAllChartTemplates() {
                    return Promise.resolve(Object.keys(getStoreObj(CHART_TPL_KEY)));
                },
                saveChartTemplate(name, content) {
                    const all = getStoreObj(CHART_TPL_KEY);
                    all[name] = content;
                    setStoreObj(CHART_TPL_KEY, all);
                    return Promise.resolve();
                },
                getChartTemplateContent(name) {
                    const all = getStoreObj(CHART_TPL_KEY);
                    return Promise.resolve({ content: all[name] || {} });
                },
                removeChartTemplate(name) {
                    const all = getStoreObj(CHART_TPL_KEY);
                    delete all[name];
                    setStoreObj(CHART_TPL_KEY, all);
                    return Promise.resolve();
                },
            };
        }

        function changeLayout(layout) {

            // Update UI

                btn.classList.toggle('is-active', btn.dataset.layout === layout);
            });

            // Update toolbar button icon
            const layoutBtn = document.getElementById('btnLayout');
            if (layoutBtn && layoutIcons[layout]) {
                layoutBtn.innerHTML = layoutIcons[layout];
            }

            // Destroy existing widgets
            tvWidgets.forEach(widget => {
                if (widget) {
                    try {

                    }
                }
            });
            tvWidgets = [];

            // Update container layout

                const cell0 = document.createElement('div');

                cell0.id = 'chart_0';
                container.appendChild(cell0);

                container.appendChild(rightPanel);

                initChartDivider(dividerMain, 'horizontal');
                initChartDividerRight(dividerRight);
            }

            // Initialize new widgets
            setTimeout(() => {
                for (let i = 0; i < chartCount; i++) {
                    const symbol = i === 0 ? (watchlistManager ? watchlistManager.selectedSymbol : defaultSymbols[0]) : defaultSymbols[i];
                    createWidget(i, symbol);
                }
                selectChart(0);
                toggleLayoutSelector();
            }, 100);
        }

        // Right panel divider drag logic (for vertical split in right panel)
        function initChartDividerRight(divider) {
            let isDragging = false;
            let startPos = 0;
            let startSize0 = 0;
            let startSize1 = 0;

            divider.addEventListener('mousedown', (e) => {
                isDragging = true;
                divider.classList.add('is-dragging');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';

                const cell0 = document.getElementById('chart_1');
                const cell1 = document.getElementById('chart_2');

                cell0.classList.add('no-pointer-events');
                cell1.classList.add('no-pointer-events');

                startPos = e.clientY;
                startSize0 = cell0.offsetHeight;
                startSize1 = cell1.offsetHeight;

                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const cell0 = document.getElementById('chart_1');
                const cell1 = document.getElementById('chart_2');
                const delta = e.clientY - startPos;

                const newSize0 = Math.max(100, startSize0 + delta);
                const newSize1 = Math.max(100, startSize1 - delta);
                const totalSize = startSize0 + startSize1;

                cell0.style.flex = `0 0 ${(newSize0 / totalSize) * 100}%`;
                cell1.style.flex = `0 0 ${(newSize1 / totalSize) * 100}%`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    divider.classList.remove('is-dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';

                    const cell0 = document.getElementById('chart_1');
                    const cell1 = document.getElementById('chart_2');
                    if (cell0) cell0.classList.remove('no-pointer-events');
                    if (cell1) cell1.classList.remove('no-pointer-events');
                }
            });
        }

        // Chart divider drag logic
        function initChartDivider(divider, layout) {
            let isDragging = false;
            let startPos = 0;
            let startSize0 = 0;
            let startSize1 = 0;

            const isVertical = layout === 'vertical';

            divider.addEventListener('mousedown', (e) => {
                isDragging = true;
                divider.classList.add('is-dragging');
                document.body.style.cursor = isVertical ? 'row-resize' : 'col-resize';
                document.body.style.userSelect = 'none';

                const cell0 = document.getElementById('chart_0');
                // For left1-right2 layout, cell1 is the right-panel
                const cell1 = currentLayout === 'left1-right2'
                    ? document.querySelector('.right-panel')
                    : document.getElementById('chart_1');

                // Disable iframe pointer events
                document.querySelectorAll('.chart-cell').forEach(cell => {
                    cell.classList.add('no-pointer-events');
                });

                startPos = isVertical ? e.clientY : e.clientX;
                startSize0 = isVertical ? cell0.offsetHeight : cell0.offsetWidth;
                startSize1 = isVertical ? cell1.offsetHeight : cell1.offsetWidth;

                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const cell0 = document.getElementById('chart_0');
                const cell1 = currentLayout === 'left1-right2'
                    ? document.querySelector('.right-panel')
                    : document.getElementById('chart_1');
                const currentPos = isVertical ? e.clientY : e.clientX;
                const delta = currentPos - startPos;

                const newSize0 = Math.max(100, startSize0 + delta);
                const newSize1 = Math.max(100, startSize1 - delta);
                const totalSize = startSize0 + startSize1;

                cell0.style.flex = `0 0 ${(newSize0 / totalSize) * 100}%`;
                cell1.style.flex = `0 0 ${(newSize1 / totalSize) * 100}%`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    divider.classList.remove('is-dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';

                    // Re-enable iframe pointer events
                    document.querySelectorAll('.chart-cell').forEach(cell => {
                        cell.classList.remove('no-pointer-events');
                    });
                }
            });
        }

                isResizing = true;
                resizer.classList.add('dragging');
                document.body.classList.add('resizing');
                // Disable transition during drag
                panel.style.transition = 'none';
                e.preventDefault();
            });

            // Mouse move event
            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                // Calculate new width: measured from right edge
                const containerRect = container.getBoundingClientRect();
                const newWidth = containerRect.right - e.clientX;

                // Clamp min/max width
                const minWidth = 200;
                const maxWidth = 600;

                if (newWidth >= minWidth && newWidth <= maxWidth) {
                    panel.style.width = `${newWidth}px`;
                }
            });

            // Mouse up event
            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('dragging');
                    document.body.classList.remove('resizing');
                    // Restore transition
                    panel.style.transition = '';
                }
            });
        }

        // ============ Initialize ============
        // Wait for backend to be ready
        async function waitForBackend(maxAttempts = 10, interval = 1000) {
            for (let i = 0; i < maxAttempts; i++) {
                try {
                    const res = await fetch(`${getApiBaseUrl()}/config`, { method: 'GET', ...getDatafeedFetchInit() });
                    if (res.ok) return true;
                } catch (e) {
                    console.log(`Waiting for backend... (${i + 1}/${maxAttempts})`);
                }
                await new Promise(r => setTimeout(r, interval));
            }
            return false;
        }

        async function init() {
            initThemePreference();

            // Load supported symbols from backend
            await watchlistManager.initFromBackend();

            // Script editor + user indicators (must run before chart widget)
            await initScriptEditor();

            // Initialize watchlist
            initWatchlistEvents();
            initWidgetbarResizer();

            // Ensure chart iframes remain clickable (clear stale drag locks)
            document.querySelectorAll('.chart-cell.no-pointer-events').forEach(cell => {
                cell.classList.remove('no-pointer-events');
            });

            // Initialize real-time WebSocket connection (optional fallback)
            realtimeManager = new RealtimeManager();
            realtimeManager.connect();

            // Poll Tencent quotes for watchlist pseudo-realtime
            startQuotePolling();

            // Smart chart selection: detect which iframe gets focus
            window.addEventListener('blur', () => {
                // When window loses focus, an iframe likely got it
                setTimeout(() => {
                    const activeEl = document.activeElement;
                    if (activeEl && activeEl.tagName === 'IFRAME') {
                        // Find which chart cell contains this iframe
                        const chartCells = document.querySelectorAll('.chart-cell');
                        chartCells.forEach((cell, index) => {
                            if (cell.contains(activeEl)) {
                                selectChart(index);
                            }
                        });
                    }
                }, 0);
            });

            // Initialize with persisted active symbol
            if (watchlistManager) {
                watchlistManager.selectedSymbol = getChartActiveSymbol();
            }
            if (getAppliedStudyDescription()) {
                pendingApplyStudy = true;
            }
            createWidget(0, getChartActiveSymbol());
            selectChart(0);

        }

        // ============ Authentication Guard ============
        // ============ Simple Auth Check ============
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join(''));
            return JSON.parse(jsonPayload);
        }

        function checkAuth() {
            const savedUser = localStorage.getItem('auth_user');
            const savedToken = localStorage.getItem('auth_token');
            const loginTime = localStorage.getItem('auth_login_time');

            if (savedUser && savedToken && loginTime) {
                try {
                    const maxAge = 144 * 60 * 60 * 1000; // 144 hours
                    if ((Date.now() - parseInt(loginTime)) < maxAge) {
                        return JSON.parse(savedUser);
                    }
                } catch (e) { }
            }
            return null;
        }

        function getAuthUser() {
            return checkAuth();
        }

        window.logout = () => {
            localStorage.removeItem('auth_user');
            localStorage.removeItem('auth_token');
            localStorage.removeItem('auth_login_time');
            window.location.href = './login.html';
        };

        async function initApp() {
            syncSessionCookie();

            // DEV_MODE: skip auth for local preview
            const DEV_MODE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
            if (!DEV_MODE) {
                const user = checkAuth();
                if (!user) {
                    window.location.href = './login.html';
                    return;
                }
                if (user.email) {
                    localStorage.setItem('logged_in_email', user.email);
                    syncSessionCookie();
                }
                console.log('Authenticated as:', user.email);
            } else {
                console.log('DEV_MODE: skipping auth');
            }

            const backendReady = await waitForBackend();
            if (backendReady) {
                await fetchDailyOpens();
                init();
            } else {
                // In dev mode, still try to init even without backend
                if (DEV_MODE) {
                    console.warn('Backend not available, initializing anyway for preview');
                    init();
                } else {
                    alert('后端服务未响应，请确认 Rust 服务已启动。');
                }
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
